[tools]
ansible = "13.4.0"
"aqua:dotenvx/dotenvx" = "1.48.4"
bun = "1.3.7"
prek = "0.3.2"
terraform = "1.14.5"
"cargo:cargo-sort" = "2.0.2"
"cargo:samply" = "0.13.1"
"cargo:cross" = "0.2.5"

[tasks.deploy-cluster]
depends = ["provision-nodes", "run-ansible"]

[tasks.provision-nodes]
run = '''
#!/bin/bash

echo "Provisioning development cluster with Terraform..."
cd infra/cluster/terraform/environments/dev
terraform init
dotenv -f .env terraform apply -auto-approve -target=latitudesh_project.project
dotenv -f .env terraform apply -auto-approve
'''

[tasks.run-ansible]
run = '''
#!/bin/bash
echo "Running Ansible playbooks on provisioned nodes..."
echo "TODO"
'''

[tasks.destroy-cluster]
run = '''
#!/bin/bash

echo "Destroying development cluster with Terraform..."
cd infra/cluster/terraform/environments/dev
dotenv -f .env terraform destroy -auto-approve
'''

[tasks.dev-cp]
run = '''
#!/bin/bash

echo "Running control plane on development cluster..."
cd control-plane
bun install
bun run dev
'''

[tasks.deploy-cp]
run = '''
#!/bin/bash

echo "Deploying control plane to development cluster..."
echo "TODO"
'''

[tasks.build-x86_64-linux]
description = "Build node-agent for Linux x86_64 (static musl - Ubuntu, Debian, RHEL, CentOS)"
run = "cross build --release --target x86_64-unknown-linux-musl -p node-agent"

[tasks.build-aarch64-linux]
description = "Build node-agent for Linux ARM64 (static musl - Graviton, ARM servers)"
run = "cross build --release --target aarch64-unknown-linux-musl -p node-agent"

[tasks.build-windows]
description = "Build node-agent for Windows x86_64"
run = "cross build --release --target x86_64-pc-windows-gnu -p node-agent"

[tasks.build-all]
description = "Build node-agent for all release targets"
depends = ["build-x86_64-linux", "build-aarch64-linux", "build-windows"]
