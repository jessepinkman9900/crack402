name = "crack402-control-plane-api"
main = "src/index.ts"
compatibility_date = "2025-02-14"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "platform-api"
database_id = "local"
migrations_dir = "drizzle"

# Durable Objects
[[durable_objects.bindings]]
name = "GLOBAL_SCHEDULER"
class_name = "GlobalSchedulerDO"

[[durable_objects.bindings]]
name = "NODE_MANAGER"
class_name = "NodeManagerDO"

[[durable_objects.bindings]]
name = "SANDBOX_TRACKER"
class_name = "SandboxTrackerDO"

[[durable_objects.bindings]]
name = "TENANT_QUOTA"
class_name = "TenantQuotaDO"

[[migrations]]
tag = "v1"
new_classes = ["GlobalSchedulerDO", "NodeManagerDO", "SandboxTrackerDO", "TenantQuotaDO"]

# R2
[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "sandbox-snapshots"

# KV
[[kv_namespaces]]
binding = "TENANT_KEYS"
id = "placeholder-tenant-keys"

[[kv_namespaces]]
binding = "NODE_TOKENS"
id = "placeholder-node-tokens"

# Analytics Engine
[[analytics_engine_datasets]]
binding = "AE_SANDBOX_LIFECYCLE"
dataset = "sandbox_lifecycle"

[[analytics_engine_datasets]]
binding = "AE_EXEC_RESULTS"
dataset = "exec_results"

[[analytics_engine_datasets]]
binding = "AE_BILLING_USAGE"
dataset = "billing_usage"

[vars]
MOCK_EXTERNAL_SERVICES = "true"
FRONTEND_URL = "http://localhost:3000"
DISABLE_AUTH = "true"
